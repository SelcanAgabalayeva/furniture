<!DOCTYPE html>
<html
        xmlns:th="http://thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{/dashboard/layout}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body >
<div layout:fragment="body">
    <a th:href="@{/admin/product/create}" class="btn btn-outline-success">Create</a>
    <table class="table">
        <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Photo</th>
            <th scope="col">Price</th>


        </tr>
        </thead>
        <tbody>
        <tr th:each="product , data : ${products}" >
            <th th:text="${data.index+1}" scope="row">1</th>
            <td th:text="${product.name}">Mark</td>

            <td>
                <img th:src="@{${product.photoUrl}}" alt="Məhsul şəkli" style="width: 80px; height: auto;">
            </td>
            <td th:text="${product.price}">Mark</td>



            <td>
                <a th:href="'/admin/product/update/'+${product.id}" class="btn btn-outline-warning">update</a>
                <a th:href="'/admin/product/delete/'+${product.id}" class="btn btn-outline-danger">delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
