<!DOCTYPE html>
<html
        xmlns:th="http://thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{/dashboard/layout}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body >
<div layout:fragment="body">
    <form method="post" enctype="multipart/form-data">
        <div class="form-group">
            <input type="text" name="name" th:value="${product.name}" class="form-control col-4"
                   placeholder="name" required/>
        </div>
        <div class="form-group">
            <input type="text" name="photoUrl" th:value="${product.photoUrl}" class="form-control col-4"
                   placeholder="photoUrl" required/>
        </div>

        <div class="form-group">
            <input type="text" name="price" th:value="${product.price}" class="form-control col-4"  placeholder="content" required/>
        </div>

        <div class="form-group">
            <input type="submit" value="Update" class="btn btn-success"/>
        </div>

    </form>
</div>

</body>
</html>
